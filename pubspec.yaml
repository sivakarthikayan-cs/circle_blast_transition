name: circle_blast_transition
description: >
    Flutter page transition animation with circle blast effect. Animated route
    navigation that reveals screens through an expanding grid of circles.
    Custom page route, screen transition, navigation animation — pure Flutter,
    no dependencies, optimised for low-spec devices.
version: 0.1.0
homepage: https://github.com/sivakarthikayan-cs/circle_blast_transition

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
